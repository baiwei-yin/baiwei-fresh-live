<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生鲜直播排期填写</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;min-height:100vh;-webkit-font-smoothing:antialiased}

/* === Banner === */
.banner{background:linear-gradient(135deg,#1a7a3a 0%,#2d9e52 60%,#3ab868 100%);color:#fff;padding:36px 20px 28px;text-align:center;position:relative;overflow:hidden}
.banner::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(255,255,255,0.08);border-radius:50%}
.banner::after{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;background:rgba(255,255,255,0.06);border-radius:50%}
.banner h1{font-size:24px;font-weight:700;margin-bottom:6px;position:relative;z-index:1}
.banner .sub{font-size:13px;opacity:0.9;position:relative;z-index:1}
.banner .badge{display:inline-block;background:rgba(255,255,255,0.18);backdrop-filter:blur(4px);border-radius:20px;padding:5px 16px;font-size:12px;margin-top:12px;position:relative;z-index:1}

/* === Container === */
.container{max-width:480px;margin:0 auto;padding:0 16px 60px}

/* === Form === */
.form-card{background:#fff;border-radius:14px;margin-top:-14px;padding:20px 18px;box-shadow:0 2px 16px rgba(0,0,0,0.06);position:relative;z-index:2}
.form-group{margin-bottom:18px}
.form-group:last-of-type{margin-bottom:22px}
.form-group label{display:block;font-size:14px;font-weight:600;color:#333;margin-bottom:8px}
.form-group label .req{color:#e74c3c;margin-right:3px}

.form-group input,.form-group select{width:100%;padding:12px 14px;border:1px solid #e8e8e8;border-radius:10px;font-size:15px;color:#333;background:#fafafa;transition:all 0.2s;-webkit-appearance:none;appearance:none}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#2d9e52;background:#fff;box-shadow:0 0 0 3px rgba(45,158,82,0.1)}
.form-group input::placeholder{color:#c0c0c0}

/* Store Search */
.search-wrap{position:relative}
.search-wrap .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:#bbb;pointer-events:none}
.search-wrap input{padding-left:36px}
.search-dd{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid #e8e8e8;border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;z-index:20;display:none;box-shadow:0 6px 16px rgba(0,0,0,0.08)}
.search-dd.show{display:block}
.search-item{padding:11px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;gap:6px;transition:background 0.12s}
.search-item:last-child{border-bottom:none}
.search-item:active{background:#f0faf4}
.search-item .sel{color:#2d9e52;font-weight:700;font-size:16px;width:20px;text-align:center}
.search-item .tp{font-size:11px;color:#999;margin-left:auto;background:#f5f5f5;padding:2px 8px;border-radius:4px;white-space:nowrap}

/* Selected store */
.store-selected{display:flex;align-items:center;gap:8px;padding:12px 14px;border:1px solid #2d9e52;border-radius:10px;background:#f0faf4;font-size:15px;color:#1a7a3a;font-weight:500}
.store-selected .check{color:#2d9e52;font-size:16px}
.store-selected .reselect{margin-left:auto;color:#999;font-size:13px;cursor:pointer;text-decoration:underline}

/* Submit */
.submit-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#1a7a3a,#2d9e52);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.15s;box-shadow:0 4px 12px rgba(45,158,82,0.25)}
.submit-btn:active{transform:scale(0.98);box-shadow:0 2px 8px rgba(45,158,82,0.2)}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* === Summary === */
.summary{background:linear-gradient(135deg,#1a7a3a,#2d9e52);color:#fff;border-radius:14px;padding:18px;margin:16px 0 12px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.summary .stats{display:flex;justify-content:space-around;text-align:center}
.summary .sv{font-size:22px;font-weight:700}
.summary .sl{font-size:11px;opacity:0.85;margin-top:3px}

/* === Tier === */
.tier-card{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,0.04)}
.tier-card h3{font-size:14px;font-weight:600;margin-bottom:14px;color:#333}
.tier-row{display:flex;align-items:center;padding:6px 0}
.tier-row+.tier-row{border-top:1px solid #f5f5f5;padding-top:10px;margin-top:4px}
.tier-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.tier-info{flex:1;min-width:0}
.tier-name{font-size:13px;font-weight:500}
.tier-desc{font-size:11px;color:#999;margin-top:2px}
.tier-pbar{width:70px;height:6px;background:#eee;border-radius:3px;overflow:hidden;flex-shrink:0;margin-left:10px}
.tier-pfill{height:100%;background:linear-gradient(90deg,#1a7a3a,#3ab868);border-radius:3px;transition:width 0.4s}
.tier-pfill.done{background:linear-gradient(90deg,#f59e0b,#fbbf24)}

/* === Schedule Items === */
.schedule-toggle{background:none;border:none;color:#2d9e52;font-size:13px;font-weight:500;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:4px}
.schedule-toggle .arrow{transition:transform 0.2s;font-size:10px}
.schedule-toggle .arrow.open{transform:rotate(90deg)}

.schedule-list{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
.schedule-list.open{max-height:2000px}

.sched-item{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.sched-item.da-chang::after{content:'大场🌟';position:absolute;top:0;right:0;background:linear-gradient(135deg,#e74c3c,#ff6b6b);color:#fff;font-size:10px;padding:3px 10px;border-radius:0 12px 0 8px;font-weight:600}
.sched-item .si-store{font-size:15px;font-weight:600;color:#333}
.sched-item .si-time{font-size:13px;color:#666;margin-top:4px}
.sched-item .si-gmv{font-size:13px;color:#1a7a3a;font-weight:500;margin-top:3px}
.sched-item .si-del{position:absolute;bottom:10px;right:14px;background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;padding:4px}
.sched-item .si-del:active{color:#e74c3c}

.empty-tip{text-align:center;padding:36px 20px;color:#bbb;font-size:14px;line-height:1.8}

/* === Modal === */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;visibility:hidden;transition:all 0.25s}
.modal-bg.show{opacity:1;visibility:visible}
.modal-box{background:#fff;border-radius:18px;padding:36px 28px 28px;text-align:center;max-width:280px;width:88%;transform:scale(0.9);transition:transform 0.25s}
.modal-bg.show .modal-box{transform:scale(1)}
.modal-box .mico{font-size:52px;margin-bottom:14px}
.modal-box h2{font-size:18px;font-weight:700;margin-bottom:10px;color:#333}
.modal-box p{font-size:13px;color:#666;line-height:1.7}
.modal-box .mbtn{margin-top:22px;padding:11px 44px;border:none;border-radius:10px;background:linear-gradient(135deg,#1a7a3a,#2d9e52);color:#fff;font-size:14px;font-weight:600;cursor:pointer}


/* === Schedule Summary === */
.sched-summary{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,0.04)}
.sched-summary h3{font-size:14px;font-weight:600;color:#333;margin-bottom:12px}
.sched-week-label{font-size:11px;color:#999;margin-bottom:8px}
.sched-total{display:flex;justify-content:space-around;background:#f7faf8;border-radius:10px;padding:12px 8px;margin-bottom:14px}
.sched-total .st-item{text-align:center}
.sched-total .st-val{font-size:20px;font-weight:700;color:#1a7a3a}
.sched-total .st-lab{font-size:11px;color:#999;margin-top:2px}
.anchor-row{display:flex;align-items:center;padding:8px 0;border-top:1px solid #f5f5f5}
.anchor-row:first-child{border-top:none}
.anchor-tag{font-size:11px;background:#e8f5ec;color:#1a7a3a;border-radius:6px;padding:2px 8px;margin-right:8px;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.anchor-stats{flex:1;font-size:12px;color:#666}
.anchor-stats b{color:#333}
.anchor-da{font-size:11px;color:#e74c3c;margin-left:6px;font-weight:600}

/* === Schedule Items (redesign) === */
.sched-item{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:8px;position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.04);display:flex;align-items:center;gap:10px}
.sched-item.da-chang{border-left:3px solid #e74c3c}
.si-date-block{text-align:center;min-width:44px}
.si-date-block .si-md{font-size:15px;font-weight:700;color:#1a7a3a;line-height:1.2}
.si-date-block .si-wd{font-size:10px;color:#999}
.si-body{flex:1;min-width:0}
.si-time-row{font-size:13px;color:#555;margin-bottom:2px}
.si-gmv-row{font-size:13px;font-weight:600;color:#1a7a3a}
.si-da-badge{display:inline-block;background:#fff0f0;color:#e74c3c;font-size:10px;font-weight:600;border-radius:4px;padding:1px 6px;margin-left:6px}
.si-del{background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}
.si-del:active{color:#e74c3c}

/* === Footer === */
.footer{text-align:center;padding:28px 16px 20px;font-size:11px;color:#ccc}
</style>
</head>
<body>

<div class="banner">
  <h1>🥬 直播排期填写</h1>
  <div class="sub">小红书电商 · 生鲜行业扶持计划</div>
  <div class="badge">🔥 流量扶持已开启 · 首页推荐专属入口</div>
</div>

<div class="container">
  <!-- Form -->
  <div class="form-card">
    <form id="schedForm">
      <!-- Store -->
      <div class="form-group" id="storeGroup">
        <label><span class="req">*</span>店铺名称</label>
        <div class="search-wrap" id="searchWrap">
          <span class="ico">🔍</span>
          <input type="text" id="storeInput" placeholder="搜索店铺名称..." autocomplete="off">
          <div class="search-dd" id="storeDd"></div>
        </div>
        <div class="store-selected" id="storeSel" style="display:none">
          <span class="check">✅</span>
          <span id="storeSelName"></span>
          <span class="reselect" id="reselectBtn">重新选择</span>
        </div>
        <input type="hidden" id="storeId">
        <input type="hidden" id="storeNameVal">
      </div>
      <!-- 子账号选择 -->
      <div class="form-group" id="anchorGroup" style="display:none">
        <label><span class="req">*</span>开播账号（子账号）</label>
        <div class="search-wrap" id="anchorSearchWrap">
          <span class="ico">📡</span>
          <input type="text" id="anchorInput" placeholder="选择开播账号..." autocomplete="off" readonly>
          <div class="search-dd" id="anchorDd"></div>
        </div>
        <input type="hidden" id="anchorId">
      </div>

      <!-- Date -->
      <div class="form-group">
        <label><span class="req">*</span>直播日期</label>
        <input type="date" id="liveDate">
      </div>

      <!-- Start Time -->
      <div class="form-group">
        <label><span class="req">*</span>开播时间</label>
        <input type="time" id="liveTime" value="19:00">
      </div>

      <!-- Duration -->
      <div class="form-group">
        <label>预计开播时长（小时）</label>
        <input type="number" id="liveDur" value="4" min="1" max="24" placeholder="默认4小时">
      </div>

      <!-- GMV -->
      <div class="form-group">
        <label><span class="req">*</span>预估GMV</label>
        <input type="number" id="liveGmv" placeholder="¥ 请输入预估成交额" min="0">
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">提交排期 ✨</button>
    </form>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="stats">
      <div><div class="sv" id="vSessions">0</div><div class="sl">本周累计场次</div></div>
      <div><div class="sv" id="vGmv">0.0</div><div class="sl">计划成交(万)</div></div>
      <div><div class="sv" id="vDaChang">0</div><div class="sl">大场</div></div>
    </div>
  </div>

  <!-- Tier -->
  <div class="tier-card">
    <h3>📊 扶持进度</h3>
    <div class="tier-row">
      <div class="tier-icon">🔥</div>
      <div class="tier-info"><div class="tier-name">专属扶持资源</div><div class="tier-desc">本周＞5场解锁</div></div>
      <div class="tier-pbar"><div class="tier-pfill" id="bar3" style="width:0%"></div></div>
    </div>
    <div class="tier-row">
      <div class="tier-icon">⚡</div>
      <div class="tier-info"><div class="tier-name">官方加热</div><div class="tier-desc">本周＞3场解锁</div></div>
      <div class="tier-pbar"><div class="tier-pfill" id="bar2" style="width:0%"></div></div>
    </div>
    <div class="tier-row">
      <div class="tier-icon">🔒</div>
      <div class="tier-info"><div class="tier-name">还差 <span id="remainN">5</span> 场解锁</div><div class="tier-desc">继续加油！</div></div>
      <div class="tier-pbar"><div class="tier-pfill" id="bar1" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Schedule Summary -->
  <div class="sched-summary" id="schedSummary" style="display:none">
    <h3>📅 我的直播排期</h3>
    <div class="sched-week-label" id="schedWeekLabel"></div>
    <div class="sched-total">
      <div class="st-item"><div class="st-val" id="vSessions2">0</div><div class="st-lab">累计场次</div></div>
      <div class="st-item"><div class="st-val" id="vGmv2">0.0</div><div class="st-lab">预估GMV(万)</div></div>
      <div class="st-item"><div class="st-val" id="vDaChang2">0</div><div class="st-lab">大场</div></div>
    </div>
    <div id="anchorBreakdown"></div>
    <div id="schedList"></div>
  </div>
</div>

<div class="footer">小红书电商 · 生鲜行业运营团队</div>

<!-- Success Modal -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div class="mico">🎉</div>
    <h2>排期提交成功！</h2>
    <p>我们已收到你的直播计划<br>流量扶持将在开播前自动安排<br><br>加油，这场一定爆！🔥</p>
    <button class="mbtn" id="modalClose">知道了</button>
  </div>
</div>

var DA_CHANG = 30000;

var GH_REPO='baiwei-yin/baiwei-fresh-live';
var GH_API='https://api.github.com/repos/'+GH_REPO+'/issues';
var _cache = [];

async function load(){
  try {
    var r = await fetch(GH_API + '?labels=%E6%8E%92%E6%9C%9F%E6%8F%90%E6%8A%A5&state=open&per_page=100', {
      headers: {
        'Authorization': 'token ' + _p1,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      }
    });
    var issues = await r.json();
    _cache = issues.map(function(issue) {
      var data = {};
      issue.body.split('\n').forEach(function(line) {
        var parts = line.split('=');
        if(parts.length >= 2) data[parts[0]] = parts.slice(1).join('=');
      });
      data.issue_number = issue.number;
      data.gmv = parseFloat(data.gmv) || 0;
      data.isDaChang = data.is_da_chang === 'true';
      data.dur = parseInt(data.duration) || 4;
      // 统一字段名：store_name → storeName
      if(data.store_name && !data.storeName) data.storeName = data.store_name;
      return data;
    });
    return _cache;
  } catch(e) { return _cache; }
}

async function save(item){
  try {
    var title = '【排期】' + item.storeName + ' - ' + item.date;
    var body = 'store_name=' + item.storeName + '\n' +
               'store_id=' + item.storeId + '\n' +
               'date=' + item.date + '\n' +
               'time=' + item.time + '\n' +
               'duration=' + item.dur + '\n' +
               'gmv=' + item.gmv + '\n' +
               'is_da_chang=' + item.isDaChang + '\n' +
               'ts=' + item.ts;
    await fetch(GH_API, {
      method: 'POST',
      headers: {
        'Authorization': 'token ' + _p1,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28'
      },
      body: JSON.stringify({ title: title, body: body, labels: ['排期提报'] })
    });
  } catch(e) {}
}

async function removeItem(id){
  try {
    var item = _cache.find(function(x){ return x.id===id });
    if(item && item.issue_number) {
      await fetch(GH_API + '/' + item.issue_number, {
        method: 'PATCH',
        headers: {
          'Authorization': 'token ' + _p1,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
          'X-GitHub-Api-Version': '2022-11-28'
        },
        body: JSON.stringify({ state: 'closed' })
      });
    }
  } catch(e) {}
}

// === 工具函数 ===
var WD=['日','一','二','三','四','五','六'];
function fmtDate(d){
  var dt=new Date(d+'T00:00:00');
  var m=('0'+(dt.getMonth()+1)).slice(-2),day=('0'+dt.getDate()).slice(-2);
  return m+'/'+day+' 周'+WD[dt.getDay()];
}
function getWeekRange(){
  var now=new Date();
  var mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);
  function fmt(d){return('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2)}
  return fmt(mon)+' - '+fmt(sun);
}

async function render(){
  var list=await load();

    list=list.filter(function(x){return x.storeName===curStore});
  } else {
    list=[];
  }

      tgmv=(list.reduce(function(s,x){return s+x.gmv},0)/10000).toFixed(1),
      dc=list.filter(function(x){return x.isDaChang}).length;

  document.getElementById('vSessions2').textContent=n;
  document.getElementById('vGmv2').textContent=tgmv;

  // 子账号明细

    var byAnchor={};
    list.forEach(function(s){

      if(!byAnchor[aid])byAnchor[aid]={n:0,gmv:0,da:0};
      byAnchor[aid].n++;byAnchor[aid].gmv+=s.gmv;

    });
    breakdownEl.innerHTML=Object.keys(byAnchor).map(function(aid){
      var b=byAnchor[aid];
      return '<div class="anchor-row">'+

        '<span class="anchor-stats"><b>'+b.n+'场</b> · ¥'+(b.gmv/10000).toFixed(1)+'万'+

    }).join('');

    var fd=fmtDate(s.date).split(' ');

      '<div class="si-body">'+
        '<div class="si-time-row">'+s.time+' · '+s.dur+'小时</div>'+
        '<div class="si-gmv-row">预估 ¥'+s.gmv.toLocaleString()+(s.isDaChang?'<span class="si-da-badge">大场</span>':'')+'</div>'+
      '</div>'+
      '<button class="si-del" onclick="del(''+s.id+'')">✕</button></div>';
  }).join('');
}
async function del(id){
  if(!confirm('确定删除？'))return;
  await removeItem(id);
  render();
}

// Min date
document.getElementById('liveDate').setAttribute('min',new Date().toISOString().split('T')[0]);
render();
</script>
</body>
